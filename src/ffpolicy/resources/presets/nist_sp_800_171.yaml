id: nist_sp_800_171_moderate
name: NIST SP 800-171 - CUI Moderate Impact
description: >-
  Security controls for Firefox in environments handling Controlled Unclassified
  Information (CUI) with moderate confidentiality/integrity/availability impact.
  Enforces strict security controls aligned with NIST 800-171 families AC (Access Control),
  IA (Identification & Authentication), SC (System & Communications Protection),
  and SI (System & Information Integrity). Suitable for organizations processing
  government or sensitive business data that requires encryption, access control,
  and integrity assurance.
source: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-171r3.pdf
values:
  # AC - Access Control
  ExtensionSettings:
    '*':
      installation_mode: blocked
  InstallAddonsPermission:
    Default: false
    Locked: true
  DisableDeveloperTools: true
  BlockAboutConfig: true

  # IA - Identification & Authentication
  PasswordManagerEnabled: false
  DisableFirefoxAccounts: true

  # SC - System & Communications Protection
  SSLVersionMin: tls1.3
  DNSOverHTTPS:
    Enabled: true
    Locked: true
  Proxy:
    Locked: true
  DisabledCiphers:
    TLS_RSA_WITH_3DES_EDE_CBC_SHA: true
    TLS_RSA_WITH_RC4_128_MD5: true
    TLS_RSA_WITH_RC4_128_SHA: true
    TLS_DHE_RSA_WITH_3DES_EDE_CBC_SHA: true
  EncryptedMediaExtensions:
    Enabled: true
    Locked: true

  # SI - System & Information Integrity
  Preferences:
    security.default_personal_cert:
      Value: Ask Every Time
      Status: locked
    browser.search.update: false
    dom.disable_window_move_resize: true
    dom.disable_window_flip: true
    browser.contentblocking.category:
      Value: strict
      Status: locked
  EnableTrackingProtection:
    Cryptomining: true
    Fingerprinting: true
    Locked: true
  SanitizeOnShutdown:
    Cache: true
    Cookies: true
    Downloads: true
    FormData: true
    History: true
    Sessions: true
    SiteSettings: true
    OfflineApps: true
    Locked: true
  DisableFormHistory: true
  NetworkPrediction: false
  SearchSuggestEnabled: false

  # Privacy Controls
  DisableTelemetry: true
  DisableFirefoxStudies: true
  DisableFeedbackCommands: true
  DisablePocket: true
  DisableForgetButton: false  # Keep available for manual use
  DisablePrivateBrowsing: true  # Prevent circumvention in CUI environments
  UserMessaging:
    ExtensionRecommendations: false
    FeatureRecommendations: false
    UrlbarInterventions: false
  FirefoxHome:
    Search: false
    TopSites: false
    SponsoredTopSites: false
    Pocket: false
    SponsoredPocket: false
    Highlights: false
    Snippets: false
    Locked: true

  # Permissions - Block risky permissions by default
  Permissions:
    Autoplay:
      Default: block-audio-video
    Geolocation:
      Default: block
    Microphone:
      Default: block
    Camera:
      Default: block
    Notifications:
      Default: block
    VirtualReality:
      Default: block

  # Updates & Maintenance
  DisableAppUpdate: false  # Keep auto-updates enabled for security
  ExtensionUpdate: true    # Keep extension updates enabled

rules:
  - id: NIST-800-171-AC-2.1
    version: "Rev. 3"
    severity: high
    policy: InstallAddonsPermission
    title: "AC-2(1): Account Management - Supervised User Actions"
    description: >-
      The organization manages information system accounts and privileges with
      oversight of user actions. Browser extensions can bypass security controls
      and must be restricted to prevent unauthorized system modifications and access
      to sensitive information.
    recommendation: >-
      Block all add-on installation unless explicitly pre-approved by administrators.
      Use InstallAddonsPermission to prevent user installation. Maintain a whitelist
      of approved extensions that have been vetted for security.

  - id: NIST-800-171-AC-3
    version: "Rev. 3"
    severity: high
    policy: BlockAboutConfig
    title: "AC-3: Access Enforcement"
    description: >-
      Enforce approved authorizations for logical access to information and
      system resources based on least privilege principles. Advanced Firefox
      configuration access should be restricted to prevent unauthorized changes
      that could weaken security controls or bypass organizational policies.
    recommendation: >-
      Block access to about:config to prevent unauthorized configuration changes.
      Lock security-critical preferences to ensure users cannot bypass applied policies.

  - id: NIST-800-171-AC-6
    version: "Rev. 3"
    severity: high
    policy: DisableDeveloperTools
    title: "AC-6: Least Privilege"
    description: >-
      The organization employs least privilege by restricting access to
      privileged functions and information. Firefox developer tools expose system
      internals, enable script injection attacks, and allow manipulation of
      security policies; these should be disabled in CUI environments.
    recommendation: >-
      Disable developer tools to prevent advanced users from bypassing browser
      security mechanisms or accessing sensitive debugging information about system configuration.

  - id: NIST-800-171-IA-2.1
    version: "Rev. 3"
    severity: high
    policy: DisableFirefoxAccounts
    title: "IA-2(1): Authentication - Multi-Factor Authentication"
    description: >-
      Use multi-factor authentication for remote access and local privileged
      access to CUI. Firefox Accounts are cloud-synced and lack the MFA and
      audit controls required for CUI environments; use organization-managed
      authentication instead.
    recommendation: >-
      Disable Firefox Accounts. Enforce use of organization-managed authentication
      systems that support multi-factor authentication (TOTP, hardware keys, biometric).

  - id: NIST-800-171-IA-5.1
    version: "Rev. 3"
    severity: high
    policy: PasswordManagerEnabled
    title: "IA-5(1): Authentication Mechanism Management - Password-based Authentication"
    description: >-
      Enforce minimum password complexity requirements, strength, and change
      frequency for authentication mechanisms. Firefox password manager stores
      passwords locally without organizational oversight or policy enforcement;
      centralized credential management is required for CUI systems.
    recommendation: >-
      Disable Firefox password manager. Use organization-approved credential
      vault (e.g., SSO provider, enterprise password manager) that enforces
      password policy, MFA, and audit logging.

  - id: NIST-800-171-SC-7.5
    version: "Rev. 3"
    severity: high
    policy: Proxy
    title: "SC-7(5): Boundary Protection - Managed Interfaces"
    description: >-
      Deploy managed interfaces (default deny, permit by exception) between
      information systems and external networks. Proxy configuration enforces
      boundary protection by routing all web traffic through organizational
      security controls and monitoring.
    recommendation: >-
      Configure Proxy policy to route all HTTP(S) traffic through organizational
      proxy/firewall for monitoring, filtering, and enforcement of security policies.

  - id: NIST-800-171-SC-8.1
    version: "Rev. 3"
    severity: high
    policy: SSLVersionMin
    title: "SC-8(1): Transmission Confidentiality and Integrity - Cryptographic Mechanisms"
    description: >-
      Implement cryptographic mechanisms to protect the confidentiality and
      integrity of transmitted information. TLS 1.3 provides authenticated
      encryption and should be enforced as minimum version to protect CUI from
      eavesdropping and modification attacks.
    recommendation: >-
      Enforce TLS 1.3 minimum version. Disable weak cipher suites (3DES, RC4, DHE).
      Ensure all communications with web servers use strong authenticated encryption.

  - id: NIST-800-171-SC-8.2
    version: "Rev. 3"
    severity: high
    policy: DNSOverHTTPS
    title: "SC-8(2): Transmission Confidentiality and Integrity - Pre/Post-transmission Handling"
    description: >-
      Protect information before transmission and after receipt to prevent
      unauthorized access. Standard DNS queries are sent unencrypted; DNS-over-HTTPS
      encrypts DNS resolution queries to prevent eavesdropping by ISPs, network
      operators, and government surveillance.
    recommendation: >-
      Enable and lock DNS-over-HTTPS to encrypt DNS queries and prevent
      eavesdropping on browsing activity. Use trusted DoH provider (Cloudflare, Quad9, etc.).

  - id: NIST-800-171-SI-2
    version: "Rev. 3"
    severity: high
    policy: DisableAppUpdate
    title: "SI-2: Flaw Remediation"
    description: >-
      Identify, report, and correct information system flaws in a timely manner
      using established procedures. Automatic updates ensure security patches
      are applied promptly and before exploitation windows close, reducing
      mean-time-to-patch (MTTP) for known vulnerabilities.
    recommendation: >-
      Enable automatic Firefox and extension updates. Monitor update status in
      Help > About Firefox. Enforce automatic restarts to apply updates promptly.
      Maintain patching logs for audit trail.

  - id: NIST-800-171-SI-4.1
    version: "Rev. 3"
    severity: high
    policy: EnableTrackingProtection
    title: "SI-4(1): Information System Monitoring - System-generated Alerts"
    description: >-
      Monitor information systems for anomalous activity or conditions indicative
      of a system compromise. Third-party tracking scripts and fingerprinting
      techniques enable unauthorized profiling and information collection about
      system users and their activities; blocking these prevents information exfiltration.
    recommendation: >-
      Enable strong tracking protection (Cryptomining, Fingerprinting). Prevents
      invisible tracking scripts from profiling users and leaking information
      about browsing behavior and system configuration.

  - id: NIST-800-171-SI-12
    version: "Rev. 3"
    severity: high
    policy: SanitizeOnShutdown
    title: "SI-12: Information Handling and Retention"
    description: >-
      Handle and retain information consistent with organizational requirements
      and legal obligations for CUI protection. Clear sensitive browsing data
      on shutdown prevents residual information (cache, cookies, history) from
      being accessed by other system users or forensic recovery tools.
    recommendation: >-
      Enable SanitizeOnShutdown for cache, cookies, history, sessions, and form
      data. Automatically clear sensitive data when Firefox closes. Lock setting
      to prevent users from disabling.

