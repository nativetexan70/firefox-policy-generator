id: nist_sp_800_171_high
name: NIST SP 800-171 - CUI High Impact
description: >-
  Security controls for Firefox in environments handling Controlled Unclassified
  Information (CUI) with high confidentiality/integrity impact. Enforces maximum
  security controls aligned with NIST 800-171 families AC (Access Control),
  IA (Identification & Authentication), SC (System & Communications Protection),
  and SI (System & Information Integrity). Suitable for organizations processing
  highly sensitive government contracts or near-classified information.
source: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-171r3.pdf
values:
  # AC - Access Control
  ExtensionSettings:
    '*':
      installation_mode: blocked
  InstallAddonsPermission:
    Default: false
    Locked: true
  DisableDeveloperTools: true
  BlockAboutConfig: true

  # IA - Identification & Authentication
  PasswordManagerEnabled: false
  DisableFirefoxAccounts: true

  # SC - System & Communications Protection
  SSLVersionMin: tls1.3
  DNSOverHTTPS:
    Enabled: true
    Locked: true
  Proxy:
    Locked: true
  DisabledCiphers:
    TLS_RSA_WITH_3DES_EDE_CBC_SHA: true
    TLS_RSA_WITH_RC4_128_MD5: true
    TLS_RSA_WITH_RC4_128_SHA: true
    TLS_DHE_RSA_WITH_3DES_EDE_CBC_SHA: true
  EncryptedMediaExtensions:
    Enabled: true
    Locked: true

  # SI - System & Information Integrity
  Preferences:
    security.default_personal_cert:
      Value: Ask Every Time
      Status: locked
    browser.search.update: false
    dom.disable_window_move_resize: true
    dom.disable_window_flip: true
    browser.contentblocking.category:
      Value: strict
      Status: locked
  EnableTrackingProtection:
    Cryptomining: true
    Fingerprinting: true
    Locked: true
  SanitizeOnShutdown:
    Cache: true
    Cookies: true
    Downloads: true
    FormData: true
    History: true
    Sessions: true
    SiteSettings: true
    OfflineApps: true
    Locked: true
  DisableFormHistory: true
  NetworkPrediction: false
  SearchSuggestEnabled: false

  # Privacy Controls
  DisableTelemetry: true
  DisableFirefoxStudies: true
  DisableFeedbackCommands: true
  DisablePocket: true
  DisableForgetButton: false
  DisablePrivateBrowsing: true  # CUI-High: stricter
  UserMessaging:
    ExtensionRecommendations: false
    FeatureRecommendations: false
    UrlbarInterventions: false
  FirefoxHome:
    Search: false
    TopSites: false
    SponsoredTopSites: false
    Pocket: false
    SponsoredPocket: false
    Highlights: false
    Snippets: false
    Locked: true

  # Permissions - CUI-High: stricter defaults
  Permissions:
    Autoplay:
      Default: block-audio-video
    Geolocation:
      Default: block
    Microphone:
      Default: block
    Camera:
      Default: block
    Notifications:
      Default: block
    VirtualReality:
      Default: block
    Location:
      Default: block

  # Updates & Maintenance
  DisableAppUpdate: false
  ExtensionUpdate: true

rules:
  - id: NIST-800-171-AC-2.1
    version: "Rev. 3"
    severity: high
    policy: InstallAddonsPermission
    title: "AC-2(1): Account Management - Supervised User Actions"
    description: >-
      The organization manages information system accounts and privileges with
      oversight of user actions. Browser extensions can bypass security controls
      and must be restricted to prevent unauthorized system modifications and access
      to sensitive CUI.
    recommendation: >-
      Block all add-on installation unless explicitly pre-approved by administrators.
      Use InstallAddonsPermission to prevent user installation. Maintain a curated
      whitelist of approved extensions that have been vetted for security.

  - id: NIST-800-171-AC-3
    version: "Rev. 3"
    severity: high
    policy: BlockAboutConfig
    title: "AC-3: Access Enforcement"
    description: >-
      Enforce approved authorizations for logical access to information and
      system resources based on least privilege principles. Advanced Firefox
      configuration access should be restricted to prevent unauthorized changes
      that could weaken security controls or bypass organizational policies.
    recommendation: >-
      Block access to about:config to prevent unauthorized configuration changes.
      Lock security-critical preferences to ensure users cannot bypass applied policies.

  - id: NIST-800-171-AC-6
    version: "Rev. 3"
    severity: high
    policy: DisableDeveloperTools
    title: "AC-6: Least Privilege"
    description: >-
      The organization employs least privilege by restricting access to
      privileged functions and information. Firefox developer tools expose system
      internals, enable script injection attacks, and allow manipulation of
      security policies; these must be disabled in high-sensitivity CUI environments.
    recommendation: >-
      Disable developer tools to prevent advanced users from bypassing browser
      security mechanisms or accessing sensitive debugging information about system configuration.

  - id: NIST-800-171-IA-2.1
    version: "Rev. 3"
    severity: high
    policy: DisableFirefoxAccounts
    title: "IA-2(1): Authentication - Multi-Factor Authentication"
    description: >-
      Use multi-factor authentication for remote access and privileged local
      access to systems handling high-sensitivity CUI. Firefox Accounts are
      cloud-synced and lack the MFA and audit controls required; use
      organization-managed authentication instead.
    recommendation: >-
      Disable Firefox Accounts. Enforce use of organization-managed authentication
      systems that support multi-factor authentication (TOTP, hardware keys, biometric).

  - id: NIST-800-171-IA-5.1
    version: "Rev. 3"
    severity: high
    policy: PasswordManagerEnabled
    title: "IA-5(1): Authentication Mechanism Management - Password-based Authentication"
    description: >-
      Enforce minimum password complexity requirements, strength, and change
      frequency for authentication mechanisms. Firefox password manager stores
      passwords locally without organizational oversight or policy enforcement;
      centralized credential management with full audit trail is required.
    recommendation: >-
      Disable Firefox password manager. Use organization's centralized credential
      vault with enforcement of complexity/rotation policies, MFA, and audit logging.

  - id: NIST-800-171-SC-7.5
    version: "Rev. 3"
    severity: high
    policy: Proxy
    title: "SC-7(5): Boundary Protection - Managed Interfaces"
    description: >-
      Deploy managed interfaces (default deny, permit by exception) between
      information systems and external networks. For high-sensitivity CUI,
      proxy configuration enforces strict boundary protection.
    recommendation: >-
      Configure and lock Proxy policy to route all HTTP(S) traffic through
      organizational proxy/firewall for strict monitoring, filtering, and
      enforcement of security policies. Audit all traffic.

  - id: NIST-800-171-SC-8.1
    version: "Rev. 3"
    severity: high
    policy: SSLVersionMin
    title: "SC-8(1): Transmission Confidentiality and Integrity - Cryptographic Mechanisms"
    description: >-
      Implement cryptographic mechanisms to protect the confidentiality and
      integrity of transmitted information. TLS 1.3 provides authenticated encryption
      and must be enforced as minimum version to protect high-sensitivity CUI
      from eavesdropping and modification attacks.
    recommendation: >-
      Enforce and lock TLS 1.3 minimum version. Disable weak cipher suites
      (3DES, RC4, DHE). Ensure all communications use strong authenticated encryption.

  - id: NIST-800-171-SC-8.2
    version: "Rev. 3"
    severity: high
    policy: DNSOverHTTPS
    title: "SC-8(2): Transmission Confidentiality and Integrity - Pre/Post-transmission Handling"
    description: >-
      Protect information before transmission and after receipt to prevent
      unauthorized access. Standard DNS queries leak browsing patterns; DNS-over-HTTPS
      encrypts queries to prevent eavesdropping by ISPs, network operators,
      and government surveillance on CUI browsing.
    recommendation: >-
      Enable and lock DNS-over-HTTPS to encrypt DNS queries. Use trusted DoH
      provider with privacy commitments (Cloudflare, Quad9, NextDNS, etc.).

  - id: NIST-800-171-SI-2
    version: "Rev. 3"
    severity: high
    policy: DisableAppUpdate
    title: "SI-2: Flaw Remediation"
    description: >-
      Identify, report, and correct information system flaws in a timely manner
      using established procedures. Automatic updates are critical for CUI systems;
      they ensure security patches are applied promptly before exploitation.
    recommendation: >-
      Enable automatic Firefox and extension updates with no user deferral.
      Force restarts to apply critical security updates. Maintain detailed
      audit logs of all updates for compliance verification.

  - id: NIST-800-171-SI-4.1
    version: "Rev. 3"
    severity: high
    policy: EnableTrackingProtection
    title: "SI-4(1): Information System Monitoring - System-generated Alerts"
    description: >-
      Monitor information systems for anomalous activity indicative of compromise.
      Tracking scripts and fingerprinting enable unauthorized profiling and information
      collection about system users; these must be blocked in CUI environments
      to prevent information exfiltration.
    recommendation: >-
      Enable and lock strong tracking protection (Cryptomining, Fingerprinting).
      Prevents invisible tracking scripts from profiling CUI system users and
      leaking information about their activities and system configuration.

  - id: NIST-800-171-SI-12
    version: "Rev. 3"
    severity: high
    policy: SanitizeOnShutdown
    title: "SI-12: Information Handling and Retention"
    description: >-
      Handle and retain information consistent with organizational requirements
      and legal obligations for CUI protection. Clear sensitive browsing data
      on shutdown prevents CUI residue (cache, cookies, history) from being
      accessed by other users or recovered via forensic analysis.
    recommendation: >-
      Enable and lock SanitizeOnShutdown for cache, cookies, history, sessions,
      form data, and site settings. Automatically purge sensitive data when Firefox
      closes to prevent unauthorized access or forensic recovery.
