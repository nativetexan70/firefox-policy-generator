# Maps each known Firefox policy name to a UI category.
# Policies not listed here fall into "Uncategorized" so nothing is ever hidden.

Security:
  - DisableSecurityBypass
  - SSLVersionMin
  - Certificates
  - BlockAboutConfig
  - PasswordManagerEnabled
  - PopupBlocking
  - DisableDeveloperTools
  - Permissions
  - DisabledCiphers
  - EncryptedMediaExtensions

Extensions:
  - ExtensionSettings
  - ExtensionUpdate
  - Extensions
  - InstallAddonsPermission

UI/Bookmarks:
  - Bookmarks
  - DisplayBookmarksToolbar
  - Homepage
  - NewTabPage
  - UserMessaging
  - FirefoxHome
  - DisableFeedbackCommands

Privacy & Network:
  - DisableTelemetry
  - DisablePocket
  - DisableFirefoxAccounts
  - Proxy
  - DNSOverHTTPS
  - DisableFormHistory
  - DisableForgetButton
  - DisablePrivateBrowsing
  - SearchSuggestEnabled
  - NetworkPrediction
  - EnableTrackingProtection
  - SanitizeOnShutdown
  - DisableFirefoxStudies
  - IPProtectionAvailable

Updates:
  - DisableAppUpdate
  - AppUpdateURL
  - ManualAppUpdateOnly

AI Controls:
  - AIControls
  - GenerativeAI

Custom Preferences:
  - Preferences
