name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the AppImage filename"
        required: false
        default: "dev"

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-image0 libxcb-render-util0 libxcb-util1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          lint-imports
      - name: Type check
        run: mypy src
      - name: Test
        run: |
          export QT_QPA_PLATFORM=offscreen
          pytest --cov=ffpolicy

  build-appimage:
    needs: test
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool
      - name: Build AppImage
        run: >-
          bash src/ffpolicy/packager/build_appimage.sh
          "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ffpolicy-appimage
          path: dist/*.AppImage
